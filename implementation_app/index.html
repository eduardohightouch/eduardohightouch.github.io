// ── Overview Intelligence ──
function computeOverview(tasks){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==="complete").length;
  const inProg=tasks.filter(t=>t.status==="in_progress").length;
  const blocked=tasks.filter(t=>t.status==="blocked").length;
  const pct=total?Math.round(done/total*100):0;

  // current phase
  const phaseProgress=PHASES.map(ph=>{
    const pt=tasks.filter(t=>t.phase===ph.id);
    const pd=pt.filter(t=>t.status==="complete"||t.status==="na").length;
    return {id:ph.id,label:ph.label,icon:ph.icon,color:ph.color,total:pt.length,done:pd,pct:pt.length?Math.round(pd/pt.length*100):0};
  });
  const activePhase=phaseProgress.find(p=>p.pct<100)||phaseProgress[phaseProgress.length-1];

  // next up: first non-complete, non-na, non-optional tasks in order
  const nextUp=tasks.filter(t=>t.status!=="complete"&&t.status!=="na"&&!t.opt).slice(0,3);

  // in-progress items
  const wip=tasks.filter(t=>t.status==="in_progress").slice(0,3);

  // blocked
  const blockedItems=tasks.filter(t=>t.status==="blocked").slice(0,3);

  // upcoming workshops (not complete, not na)
  const workshops=tasks.filter(t=>t.workshop&&t.status!=="complete"&&t.status!=="na").slice(0,3);

  // recently completed (last few)
  const completed=tasks.filter(t=>t.status==="complete");
  const recentlyDone=completed.slice(-3).reverse();

  // is done?
  const allDone=pct===100;

  return {total,done,inProg,blocked,pct,phaseProgress,activePhase,nextUp,wip,blockedItems,workshops,recentlyDone,allDone};
}

function OverviewPanel({tasks}){
  const o=useMemo(()=>computeOverview(tasks),[tasks]);

  const phLabel=(phaseId)=>{const p=PHASES.find(x=>x.id===phaseId);return p?p.icon+" "+p.label:phaseId;};
  const prodLabel=(prodId)=>{if(!prodId)return"Core";const p=PRODUCTS.find(x=>x.id===prodId);return p?p.icon+" "+p.label:"";};

  if(o.allDone) return <div className="fade-in" style={{background:"linear-gradient(135deg,#dcfce7,#d1fae5)",border:"1px solid #86efac",borderRadius:14,padding:20,marginBottom:20,textAlign:"center"}}>
    <div style={{fontSize:32,marginBottom:6}}>🎉</div>
    <div style={{fontWeight:800,fontSize:18,color:"#166534"}}>Implementation Complete!</div>
    <div style={{fontSize:13,color:"#15803d",marginTop:4}}>All {o.total} tasks are done. Time to transition to ongoing support.</div>
  </div>;

  return <div className="fade-in" style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:0,marginBottom:20,overflow:"hidden"}}>
    {/* Progress header */}
    <div style={{padding:"16px 20px 12px",borderBottom:"1px solid #f1f5f9"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>Implementation Overview</div>
        <div style={{display:"flex",gap:12,fontSize:12,color:"#64748b"}}>
          <span><strong style={{color:"#22c55e"}}>{o.done}</strong> done</span>
          <span><strong style={{color:"#f59e0b"}}>{o.inProg}</strong> in progress</span>
          {o.blocked>0&&<span><strong style={{color:"#ef4444"}}>{o.blocked}</strong> blocked</span>}
        </div>
      </div>
      <div style={{height:10,borderRadius:5,background:"#f1f5f9",overflow:"hidden",display:"flex"}}>
        {o.done>0&&<div style={{width:(o.done/o.total*100)+"%",background:"#22c55e",transition:"width .4s"}}/>}
        {o.inProg>0&&<div style={{width:(o.inProg/o.total*100)+"%",background:"#f59e0b",transition:"width .4s"}}/>}
        {o.blocked>0&&<div style={{width:(o.blocked/o.total*100)+"%",background:"#ef4444",transition:"width .4s"}}/>}
      </div>
      {/* Phase pills */}
      <div style={{display:"flex",gap:6,marginTop:10}}>
        {o.phaseProgress.filter(p=>p.total>0).map(p=><div key={p.id} style={{flex:1,padding:"6px 10px",borderRadius:8,background:p.pct===100?"#dcfce7":p.id===o.activePhase.id?"#eef2ff":"#f8fafc",border:p.id===o.activePhase.id?"1.5px solid "+p.color:"1px solid #e2e8f0",transition:".2s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,fontWeight:600,color:p.pct===100?"#166534":"#1e293b"}}>{p.icon} {p.label}</span>
            <span style={{fontSize:11,fontWeight:700,color:p.pct===100?"#22c55e":p.color}}>{p.pct}%</span>
          </div>
          <div style={{height:3,borderRadius:2,background:"#e2e8f0",marginTop:4,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:2,background:p.pct===100?"#22c55e":p.color,width:p.pct+"%",transition:"width .4s"}}/>
          </div>
        </div>)}
      </div>
    </div>

    {/* Cards grid */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
      {/* Next Up */}
      <div style={{padding:"14px 20px",borderRight:"1px solid #f1f5f9",borderBottom:o.blockedItems.length>0||o.workshops.length>0?"1px solid #f1f5f9":"none"}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"#6366f1",marginBottom:8,letterSpacing:".5px"}}>⏭️ Next Up</div>
        {o.nextUp.length===0?<div style={{fontSize:12,color:"#94a3b8"}}>Nothing pending — all caught up!</div>:
          o.nextUp.map((t,i)=><div key={t.id} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:i<o.nextUp.length-1?8:0}}>
            <div style={{width:20,height:20,borderRadius:6,background:i===0?"#6366f1":"#f1f5f9",color:i===0?"#fff":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,marginTop:1}}>{i+1}</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{t.task}</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{phLabel(t.phase)} {t.product?("· "+prodLabel(t.product)):""} {t.team?("· "+t.team):""}</div>
            </div>
          </div>)
        }
      </div>

      {/* In Progress */}
      <div style={{padding:"14px 20px",borderBottom:o.blockedItems.length>0||o.workshops.length>0?"1px solid #f1f5f9":"none"}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"#f59e0b",marginBottom:8,letterSpacing:".5px"}}>🔄 In Progress</div>
        {o.wip.length===0?<div style={{fontSize:12,color:"#94a3b8"}}>No tasks currently in progress.</div>:
          o.wip.map((t,i)=><div key={t.id} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:i<o.wip.length-1?8:0}}>
            <div style={{width:6,height:6,borderRadius:3,background:"#f59e0b",flexShrink:0,marginTop:6}}/>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{t.task}</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{phLabel(t.phase)} {t.owner?("· "+t.owner):""}</div>
            </div>
          </div>)
        }
      </div>

      {/* Blocked */}
      {o.blockedItems.length>0&&<div style={{padding:"14px 20px",borderRight:"1px solid #f1f5f9"}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"#ef4444",marginBottom:8,letterSpacing:".5px"}}>🚨 Blocked</div>
        {o.blockedItems.map((t,i)=><div key={t.id} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:i<o.blockedItems.length-1?8:0}}>
          <div style={{width:6,height:6,borderRadius:3,background:"#ef4444",flexShrink:0,marginTop:6}}/>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{t.task}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{t.owner?t.owner+" · ":""}{phLabel(t.phase)}</div>
          </div>
        </div>)}
      </div>}

      {/* Upcoming Workshops */}
      {o.workshops.length>0&&<div style={{padding:"14px 20px",borderRight:o.blockedItems.length===0?"1px solid #f1f5f9":"none"}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"#8b5cf6",marginBottom:8,letterSpacing:".5px"}}>🎓 Upcoming Workshops</div>
        {o.workshops.map((t,i)=><div key={t.id} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:i<o.workshops.length-1?8:0}}>
          <div style={{width:6,height:6,borderRadius:3,background:"#8b5cf6",flexShrink:0,marginTop:6}}/>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{t.task}</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>{phLabel(t.phase)} {t.product?("· "+prodLabel(t.product)):""}</div>
          </div>
        </div>)}
      </div>}

      {/* Recently Completed — show if no blocked and no workshops to fill space, or always if there's room */}
      {o.recentlyDone.length>0&&(o.blockedItems.length===0&&o.workshops.length===0)&&<React.Fragment>
        <div style={{padding:"14px 20px",borderRight:"1px solid #f1f5f9",borderTop:"1px solid #f1f5f9"}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"#22c55e",marginBottom:8,letterSpacing:".5px"}}>✅ Recently Completed</div>
          {o.recentlyDone.map((t,i)=><div key={t.id} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:i<o.recentlyDone.length-1?8:0}}>
            <div style={{width:6,height:6,borderRadius:3,background:"#22c55e",flexShrink:0,marginTop:6}}/>
            <div>
              <div style={{fontSize:13,fontWeight:500,color:"#64748b",textDecoration:"line-through"}}>{t.task}</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{phLabel(t.phase)}</div>
            </div>
          </div>)}
        </div>
      </React.Fragment>}
    </div>
  </div>;
}

function StatusBadge({status,onChange,editable}){
  const s=getS(status);
  if(!editable) return <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:99,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.l}</span>;
  return <select value={status} onChange={e=>onChange(e.target.value)} style={{fontSize:11,fontWeight:600,padding:"2px 6px",borderRadius:8,background:s.bg,color:s.c,border:"none",cursor:"pointer",outline:"none"}}>{STATUS_OPTIONS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>;
}

function TaskRow({task,onUpdate,editable}){
  const [exp,setExp]=useState(false);
  return <div style={{borderBottom:"1px solid #f1f5f9"}}>
    <div style={{display:"grid",gridTemplateColumns:"minmax(0,2.2fr) minmax(0,1fr) 100px 96px 96px 32px",alignItems:"center",padding:"8px 12px",gap:6,fontSize:13}}>
      <div>
        <div style={{fontWeight:500,color:"#1e293b",display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
          {task.opt&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:4,background:"#fef3c7",color:"#d97706"}}>OPTIONAL</span>}
          {task.workshop&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:4,background:"#ede9fe",color:"#7c3aed"}}>WORKSHOP</span>}
          {task.task}
        </div>
        <div style={{fontSize:11,color:"#94a3b8",marginTop:1,lineHeight:1.3}}>{task.desc}</div>
      </div>
      <div style={{fontSize:11,color:"#64748b"}}>{task.resource&&(task.link?<a href={task.link} target="_blank" rel="noreferrer" style={{color:"#6366f1",textDecoration:"none"}}>{task.resource}</a>:<span>{task.resource}</span>)}</div>
      <input placeholder="Owner" value={task.owner||""} disabled={!editable} onChange={e=>onUpdate({...task,owner:e.target.value})} style={{border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 6px",fontSize:11,background:editable?"#fff":"#f8fafc",color:"#334155",minWidth:0}}/>
      <input type="date" value={task.targetDate||""} disabled={!editable} onChange={e=>onUpdate({...task,targetDate:e.target.value})} style={{border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 4px",fontSize:10,background:editable?"#fff":"#f8fafc",color:"#334155",minWidth:0}}/>
      <StatusBadge status={task.status} editable={editable} onChange={v=>onUpdate({...task,status:v})}/>
      <button onClick={()=>setExp(!exp)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#94a3b8",transform:exp?"rotate(90deg)":"none",transition:".15s"}}>▶</button>
    </div>
    {exp&&<div style={{padding:"4px 12px 10px",display:"flex",gap:10,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:160}}>
        <label style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",fontWeight:600}}>Notes</label>
        <textarea placeholder="Add notes..." value={task.notes||""} disabled={!editable} onChange={e=>onUpdate({...task,notes:e.target.value})} rows={2} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"4px 6px",fontSize:12,resize:"vertical",background:editable?"#fff":"#f8fafc",boxSizing:"border-box"}}/>
      </div>
      <div style={{minWidth:100}}>
        <label style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",fontWeight:600}}>Recommended team</label>
        <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{task.team||"—"}</div>
      </div>
    </div>}
  </div>;
}

function PhaseSection({phase,tasks,onUpdate,editable}){
  const [collapsed,setCollapsed]=useState(false);
  const ph=PHASES.find(p=>p.id===phase);
  const done=tasks.filter(t=>t.status==="complete").length;
  const coreTasks=tasks.filter(t=>!t.product);
  const prodGroups=PRODUCTS.map(pr=>({pr,items:tasks.filter(t=>t.product===pr.id)})).filter(x=>x.items.length>0);
  return <div style={{marginBottom:18,border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden",background:"#fff"}}>
    <div onClick={()=>setCollapsed(!collapsed)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",background:"linear-gradient(135deg,"+ph.color+"11,"+ph.color+"05)",borderBottom:collapsed?"none":"1px solid #e2e8f0"}}>
      <span style={{fontSize:13,transform:collapsed?"none":"rotate(90deg)",transition:".15s",color:ph.color}}>▶</span>
      <span style={{fontSize:18}}>{ph.icon}</span>
      <div style={{flex:1}}><span style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{ph.label}</span><span style={{fontSize:12,color:"#94a3b8",marginLeft:8}}>{ph.timeline}</span></div>
      <span style={{fontSize:12,color:"#94a3b8",fontWeight:500}}>{done}/{tasks.length} done</span>
    </div>
    {!collapsed&&<div>
      <div style={{display:"grid",gridTemplateColumns:"minmax(0,2.2fr) minmax(0,1fr) 100px 96px 96px 32px",padding:"5px 12px",gap:6,fontSize:10,color:"#94a3b8",textTransform:"uppercase",fontWeight:600,borderBottom:"1px solid #f1f5f9"}}>
        <span>Task</span><span>Resource</span><span>Owner</span><span>Due</span><span>Status</span><span/>
      </div>
      {coreTasks.map(t=><TaskRow key={t.id} task={t} onUpdate={onUpdate} editable={editable}/>)}
      {prodGroups.map(({pr,items})=><div key={pr.id}>
        <div style={{padding:"7px 12px",fontSize:12,fontWeight:700,color:"#1e293b",background:"#f8fafc",borderTop:"1px solid #e2e8f0",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:6}}>
          <span>{pr.icon}</span> {pr.label}
          <span style={{fontSize:10,color:"#94a3b8",fontWeight:400,marginLeft:4}}>{items.filter(x=>x.status==="complete").length}/{items.length}</span>
        </div>
        {items.map(t=><TaskRow key={t.id} task={t} onUpdate={onUpdate} editable={editable}/>)}
      </div>)}
    </div>}
  </div>;
}

function ProductSelector({selected,onToggle}){
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
    {PRODUCTS.map(pr=>{
      const on=selected.has(pr.id);
      const count=MASTER.filter(t=>t.product===pr.id).length;
      return <div key={pr.id} onClick={()=>onToggle(pr.id)} style={{border:"2px solid "+(on?"#6366f1":"#e2e8f0"),borderRadius:10,padding:"12px 14px",cursor:"pointer",background:on?"#eef2ff":"#fff",transition:".15s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <span style={{fontSize:20}}>{pr.icon}</span>
          <div style={{width:20,height:20,borderRadius:6,border:"2px solid "+(on?"#6366f1":"#cbd5e1"),background:on?"#6366f1":"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:".15s"}}>
            {on&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
        </div>
        <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{pr.label}</div>
        <div style={{fontSize:11,color:"#64748b",lineHeight:1.3,marginTop:2}}>{pr.desc}</div>
        <div style={{fontSize:10,color:"#94a3b8",marginTop:4}}>{count} steps</div>
      </div>;
    })}
  </div>;
}

const LIST="list",DETAIL="detail",CREATE="create";

function App(){
  const [view,setView]=useState(LIST);
  const [projects,setProjectsRaw]=useState(()=>loadProjects());
  const [active,setActive]=useState(null);
  const [isAdmin,setIsAdmin]=useState(true);
  const [newName,setNewName]=useState("");
  const [selProducts,setSelProducts]=useState(new Set());
  const [keyInput,setKeyInput]=useState("");

  const setProjects=(fn)=>{setProjectsRaw(prev=>{const next=typeof fn==="function"?fn(prev):fn;saveProjects(next);return next;});};
  const toggleProd=id=>setSelProducts(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const coreCount=MASTER.filter(t=>!t.product).length;

  const createProject=()=>{
    if(!newName.trim())return;
    const key=newName.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-")+"-"+gid().slice(0,4);
    const tasks=MASTER.filter(t=>!t.product||selProducts.has(t.product)).map(t=>({...t,id:gid(),status:"not_started",owner:"",targetDate:"",notes:""}));
    const prods=[...selProducts];
    const p={id:gid(),name:newName.trim(),shareKey:key,tasks:tasks,products:prods,createdAt:new Date().toISOString().slice(0,10)};
    setProjects(prev=>[...prev,p]);
    setActive(p.id);setIsAdmin(true);setView(DETAIL);
    setNewName("");setSelProducts(new Set());
  };

  const updateTask=(projId,updated)=>setProjects(prev=>prev.map(p=>p.id===projId?{...p,tasks:p.tasks.map(t=>t.id===updated.id?updated:t)}:p));
  const deleteProject=(projId)=>{if(confirm("Delete this project? This cannot be undone.")){setProjects(prev=>prev.filter(p=>p.id!==projId));}};
  const openProj=(id,admin)=>{setActive(id);setIsAdmin(admin);setView(DETAIL);};
  const accessByKey=()=>{const p=projects.find(x=>x.shareKey===keyInput.trim());if(p){openProj(p.id,false);setKeyInput("");}else alert("Project not found. Check the share key.");};

  const proj=projects.find(p=>p.id===active);

  // HOME
  if(view===LIST||view===CREATE) return <div style={{minHeight:"100vh"}}>
    <div style={{maxWidth:940,margin:"0 auto",padding:"28px 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:18}}>H</div>
        <div><div style={{fontWeight:800,fontSize:22,color:"#1e293b"}}>Hightouch Implementation</div><div style={{fontSize:13,color:"#94a3b8"}}>Client Onboarding Project Plans</div></div>
      </div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:18,marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:600,color:"#1e293b",marginBottom:6}}>Client Access</div>
        <div style={{display:"flex",gap:8}}>
          <input placeholder="Enter share key (e.g. acme-a1b2)" value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&accessByKey()} style={{flex:1,border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 12px",fontSize:13}}/>
          <button onClick={accessByKey} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:8,padding:"7px 18px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Open Plan</button>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:16,fontWeight:700,color:"#1e293b"}}>All Projects (Admin)</div>
        <button onClick={()=>setView(CREATE)} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontWeight:600,fontSize:13,cursor:"pointer"}}>+ New Project</button>
      </div>
      {view===CREATE&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:20,marginBottom:18}}>
        <div style={{fontSize:16,fontWeight:700,color:"#1e293b",marginBottom:4}}>Create New Client Project</div>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>{coreCount} core steps are always included. Select which product modules apply to this client.</div>
        <input placeholder="Client name (e.g. Acme Corp)" value={newName} onChange={e=>setNewName(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:14,marginBottom:14,boxSizing:"border-box"}}/>
        <div style={{fontSize:13,fontWeight:600,color:"#1e293b",marginBottom:8}}>Product modules for this client:</div>
        <ProductSelector selected={selProducts} onToggle={toggleProd}/>
        <div style={{marginTop:14,padding:"10px 12px",background:"#f8fafc",borderRadius:8,fontSize:12,color:"#64748b"}}>This project will include <strong style={{color:"#1e293b"}}>{MASTER.filter(t=>!t.product||selProducts.has(t.product)).length} total steps</strong>: {coreCount} core + {MASTER.filter(t=>t.product&&selProducts.has(t.product)).length} from {selProducts.size} module{selProducts.size!==1?"s":""}.</div>
        <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
          <button onClick={()=>{setView(LIST);setNewName("");setSelProducts(new Set());}} style={{background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:"7px 14px",fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancel</button>
          <button onClick={createProject} disabled={!newName.trim()} style={{background:newName.trim()?"#6366f1":"#cbd5e1",color:"#fff",border:"none",borderRadius:8,padding:"7px 18px",fontWeight:600,fontSize:13,cursor:newName.trim()?"pointer":"default"}}>Create Project</button>
        </div>
      </div>}
      {projects.length===0&&view===LIST&&<div style={{textAlign:"center",padding:40,color:"#94a3b8",fontSize:14}}>No projects yet. Create your first one above.</div>}
      {projects.map(p=>{
        const d=p.tasks.filter(t=>t.status==="complete").length;
        const pct=p.tasks.length?Math.round(d/p.tasks.length*100):0;
        return <div key={p.id} style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:14,marginBottom:8,display:"flex",alignItems:"center",gap:14}}>
          <div onClick={()=>openProj(p.id,true)} style={{display:"flex",alignItems:"center",gap:14,flex:1,cursor:"pointer"}}>
            <div style={{width:42,height:42,borderRadius:10,background:"linear-gradient(135deg,#6366f122,#0ea5e922)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:"#6366f1",flexShrink:0}}>{p.name.charAt(0)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{p.name}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>{(p.products||[]).map(pid=>{const pr=PRODUCTS.find(x=>x.id===pid);return pr?<span key={pid} style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:"#ede9fe",color:"#7c3aed",fontWeight:600}}>{pr.icon} {pr.label}</span>:null;})}{(!p.products||p.products.length===0)&&<span style={{fontSize:10,color:"#94a3b8"}}>Core only</span>}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Share key: <code style={{background:"#f1f5f9",padding:"1px 5px",borderRadius:4}}>{p.shareKey}</code></div>
            </div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:18,fontWeight:800,color:pct===100?"#22c55e":"#6366f1"}}>{pct}%</div><div style={{fontSize:11,color:"#94a3b8"}}>{d}/{p.tasks.length}</div></div>
          <button onClick={e=>{e.stopPropagation();deleteProject(p.id);}} title="Delete project" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#cbd5e1",padding:"4px",flexShrink:0}}>✕</button>
        </div>;
      })}
    </div>
  </div>;

  // DETAIL
  if(!proj)return null;
  const editable=isAdmin;
  const phaseGroups=PHASES.map(ph=>({phase:ph.id,tasks:proj.tasks.filter(t=>t.phase===ph.id)})).filter(g=>g.tasks.length>0);

  return <div style={{minHeight:"100vh"}}>
    <div style={{maxWidth:1060,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <button onClick={()=>{setView(LIST);setActive(null);}} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#64748b"}}>← Back</button>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontWeight:800,fontSize:19,color:"#1e293b"}}>{proj.name}</div>
          <div style={{fontSize:11,color:"#94a3b8",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <span>{isAdmin?"Admin View":"Client View"}</span><span>·</span><span>{proj.tasks.length} tasks</span>
            {(proj.products||[]).map(pid=>{const pr=PRODUCTS.find(x=>x.id===pid);return pr?<span key={pid} style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:"#ede9fe",color:"#7c3aed",fontWeight:600}}>{pr.icon} {pr.label}</span>:null;})}
          </div>
        </div>
        {isAdmin&&<div style={{background:"#f1f5f9",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#64748b"}}>Share key: <code style={{fontWeight:700,color:"#6366f1"}}>{proj.shareKey}</code></div>}
      </div>

      <OverviewPanel tasks={proj.tasks}/>

      {phaseGroups.map(({phase,tasks})=><PhaseSection key={phase} phase={phase} tasks={tasks} editable={editable} onUpdate={t=>updateTask(proj.id,t)}/>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
